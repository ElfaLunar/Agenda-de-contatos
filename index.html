<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Contatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📘 Agenda de Contatos</h1>

    <!-- Formulário -->
    <div class="formulario">
        <input type="text" id="nome" placeholder="Nome completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="telefone" placeholder="Telefone">
        <button onclick="salvarContato()">Salvar</button>
    </div>

    <!-- Filtro -->
    <div class="filtro">
        <input type="text" id="filtro" placeholder="🔎 Filtrar por nome..." onkeyup="filtrarContatos()">
        <span class="contador">
            Total: <strong id="totalContatos">0</strong>
        </span>
    </div>

    <!-- Tabela -->
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaContatos"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
